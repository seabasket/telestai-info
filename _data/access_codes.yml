# Single source of truth for access-code pages.
#
# The code a visitor types on index.html IS the page's filename stem, and it
# is checked against the SHA-256 hashes below (see index.html) -- but the
# hash is of the *suffix only*: everything after the first "-" (or the whole
# slug if it has no dash). This is what makes codes prefix- and
# case-agnostic: "ts-snst809", "TS-SNST809", and bare "snst809" all match.
# To add a page:
#   1. create <slug>.html at the repo root (front matter: layout: default or event)
#   2. get the hash of the part after the dash (or the whole slug if there's
#      no dash):  printf '%s' "your-suffix" | shasum -a 256
#   3. add an entry here with that hash
#
# A future backend/dashboard can read or write this same file as the canonical
# list of pages + metadata.
